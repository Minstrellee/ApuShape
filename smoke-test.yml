name: Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test-windows-2022:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install torch torchvision monai timm opencv-python scikit-image numpy pillow PyQt5 albumentations scipy shapely
          pip install -e .

      - name: Run smoke test (CPU mode)
        run: |
          python .github/workflows/smoke_test.py

  smoke-test-windows-latest:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install torch torchvision monai timm opencv-python scikit-image numpy pillow PyQt5 albumentations scipy shapely
          pip install -e .

      - name: Run smoke test (CPU mode)
        run: |
          python .github/workflows/smoke_test.py